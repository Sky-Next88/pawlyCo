<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PetPaw - Cute Pet Toys</title>
<style>
body{font-family:Arial;margin:0;padding:20px;background:#f9f9f9;}
.container{max-width:900px;margin:0 auto;}
h1{color:#ff5e7e;text-align:center;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:20px;}
.card{background:white;border-radius:12px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.card img{width:100%;height:160px;object-fit:cover;border-radius:8px;}
.card h3{margin:10px 0 5px;font-size:16px;}
.card .price{color:#ff5e7e;font-weight:bold;font-size:18px;}
.form{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
input,button{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-size:14px;}
button{background:#ff5e7e;color:white;border:none;cursor:pointer;font-weight:bold;}
.admin{display:none;}
</style>
</head>
<body>
<div class="container">
<h1>PetPaw - Cute Pet Toys</h1>

<div class="form" id="adminPanel">
<input type="password" id="pass" placeholder="Enter admin password">
<button onclick="checkPass()">Unlock Admin</button>
</div>

<div class="form admin" id="addForm">
<input type="text" id="pname" placeholder="Product Name">
<input type="text" id="price" placeholder="Price (USD)">
<input type="text" id="img" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="list"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("petproducts") || "[]");
const PASSWORD = "admin123";

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";
  products.forEach((p, i) => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.img}" alt="">
        <h3>${p.name}</h3>
        <div class="price">$${p.price}</div>
      </div>`;
  });
}

function checkPass(){
  let v = document.getElementById("pass").value;
  if(v == PASSWORD){
    document.getElementById("addForm").style.display = "block";
    alert("Unlocked, you can add products now.");
  }else{
    alert("Wrong password");
  }
}

function addProduct(){
  let name = document.getElementById("pname").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;
  if(!name || !price || !img) return alert("Fill all");
  products.unshift({name, price, img});
  localStorage.setItem("petproducts", JSON.stringify(products));
  render();
  document.getElementById("pname").value="";
  document.getElementById("price").value="";
  document.getElementById("img").value="";
}

render();
</script>
</body>
</html>
